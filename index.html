<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Censo Cuenca 2026 + IA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "gemini": "#8e44ad",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
        .loading-spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(142, 68, 173, 0.2);
            border-radius: 50%;
            border-top-color: var(--gemini);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 pb-24">

<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-5 pt-6 pb-4">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <div class="bg-primary/10 p-2.5 rounded-xl">
                <span class="material-symbols-outlined text-primary font-bold">domain</span>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">Censo Cuenca 2026</h1>
                <p class="text-xs font-medium text-slate-500 dark:text-slate-400">Inteligencia Sindical Aplicada</p>
            </div>
        </div>
    </div>

    <div id="stats-container" class="flex gap-3 overflow-x-auto no-scrollbar py-1">
        <!-- Stats dinámicos -->
    </div>
</header>

<section class="px-5 space-y-4 mb-6">
    <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
        <input id="buscador" class="w-full bg-white dark:bg-slate-800 border-none rounded-xl py-3.5 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-slate-400" placeholder="Buscar por nombre, CIF o municipio..." type="text"/>
    </div>
    <div class="flex gap-2 overflow-x-auto no-scrollbar" id="filtros">
        <button class="filter-btn whitespace-nowrap px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold shadow-md" data-tipo="TODAS">Todas</button>
        <button class="filter-btn whitespace-nowrap px-5 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700" data-tipo="SI">Con Elecciones</button>
        <button class="filter-btn whitespace-nowrap px-5 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700" data-tipo="BLANCA">Blancas</button>
    </div>
</section>

<main id="lista-empresas" class="px-5 space-y-4">
    <!-- Las tarjetas se generan aquí -->
</main>

<!-- Modal IA -->
<div id="modal-ia" class="fixed inset-0 z-[100] hidden items-center justify-center p-5 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
        <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-purple-50 dark:bg-purple-900/20">
            <div class="flex items-center gap-2 text-purple-700 dark:text-purple-300 font-bold">
                <span class="material-symbols-outlined">auto_awesome</span>
                <span>Estrategia de Visita</span>
            </div>
            <button onclick="cerrarModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div id="ia-body" class="p-6 overflow-y-auto text-sm leading-relaxed text-slate-700 dark:text-slate-300">
            <!-- Contenido IA -->
        </div>
        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
            <button id="btn-audio" onclick="leerEstrategia()" class="hidden items-center gap-2 bg-purple-600 text-white px-4 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-purple-200 dark:shadow-none hover:bg-purple-700 transition-all">
                <span class="material-symbols-outlined text-sm">volume_up</span>
                Escuchar consejos
            </button>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3 flex justify-between items-center z-[60]">
    <a class="flex flex-col items-center gap-1 text-primary" href="#">
        <span class="material-symbols-outlined font-variation-fill">view_list</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Directorio</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined">map</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Mapa</span>
    </a>
    <div class="relative -top-8 size-14 rounded-full bg-primary flex items-center justify-center shadow-xl shadow-primary/40 text-white border-4 border-background-light dark:border-background-dark">
        <span class="material-symbols-outlined text-2xl">add</span>
    </div>
    <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined">analytics</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Reportes</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Perfil</span>
    </a>
</nav>

<script id="data-script" src="datos.js"></script>

<script>
    const apiKey = ""; 
    const buscador = document.getElementById('buscador');
    const lista = document.getElementById('lista-empresas');
    const statsContainer = document.getElementById('stats-container');
    const modalIa = document.getElementById('modal-ia');
    const iaBody = document.getElementById('ia-body');
    const btnAudio = document.getElementById('btn-audio');
    const filtrosBtn = document.querySelectorAll('.filter-btn');
    
    let filtroTipo = 'TODAS';
    let ultimaEstrategia = "";

    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) {
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
        throw new Error("Timeout");
    }

    async function generarEstrategia(id) {
        const empresa = empresas.find(e => e.id == id);
        if (!empresa) return;

        modalIa.classList.remove('hidden');
        modalIa.classList.add('flex');
        iaBody.innerHTML = `
            <div class="flex flex-col items-center justify-center py-10 gap-4">
                <div class="loading-spinner"></div>
                <p class="text-xs font-bold text-purple-500 animate-pulse uppercase tracking-widest">Analizando sector y plantilla...</p>
            </div>
        `;
        btnAudio.classList.add('hidden');

        const prompt = `Actúa como asesor experto en acción sindical en Cuenca. Analiza esta empresa:
        Nombre: ${empresa.empresa}
        Sector: ${empresa.sector}
        Tamaño: ${empresa.trabajadores} trabajadores
        Estado: ${empresa.tipo === 'BLANCA' ? 'Sin representación' : 'Con elecciones'}
        Municipio: ${empresa.municipio}
        Genera 3 consejos prácticos y motivadores para un delegado que va a visitarlos hoy. Máximo 80 palabras. Sin emojis.`;

        try {
            const result = await callGemini(prompt);
            ultimaEstrategia = result;
            iaBody.innerText = result;
            btnAudio.classList.remove('hidden');
            btnAudio.classList.add('flex');
        } catch (err) {
            iaBody.innerText = "No se ha podido conectar con el analista virtual. Por favor, revisa tu conexión.";
        }
    }

    async function leerEstrategia() {
        if (!ultimaEstrategia) return;
        const originalText = btnAudio.innerHTML;
        btnAudio.innerHTML = `<span class="material-symbols-outlined animate-spin text-sm">sync</span> Procesando...`;
        btnAudio.disabled = true;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-2.5-flash-preview-tts",
                    contents: [{ parts: [{ text: "Voz profesional: " + ultimaEstrategia }] }],
                    generationConfig: { 
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                    }
                })
            });

            const data = await response.json();
            const pcmData = data.candidates[0].content.parts[0].inlineData.data;
            const audioBlob = pcmToWav(pcmData, 24000);
            const audio = new Audio(URL.createObjectURL(audioBlob));
            
            btnAudio.innerHTML = `<span class="material-symbols-outlined text-sm">graphic_eq</span> Escuchando...`;
            audio.play();
            audio.onended = () => {
                btnAudio.innerHTML = originalText;
                btnAudio.disabled = false;
            };
        } catch (e) {
            btnAudio.innerHTML = "Error de audio";
            setTimeout(() => { btnAudio.innerHTML = originalText; btnAudio.disabled = false; }, 2000);
        }
    }

    function pcmToWav(base64, sampleRate) {
        const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
        const wavHeader = new ArrayBuffer(44);
        const view = new DataView(wavHeader);
        view.setUint32(0, 0x52494646, false); // RIFF
        view.setUint32(4, 36 + buffer.byteLength, true);
        view.setUint32(8, 0x57415645, false); // WAVE
        view.setUint32(12, 0x666d7420, false); // fmt
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        view.setUint32(36, 0x64617461, false); // data
        view.setUint32(40, buffer.byteLength, true);
        return new Blob([wavHeader, buffer], { type: 'audio/wav' });
    }

    function cerrarModal() { modalIa.classList.add('hidden'); modalIa.classList.remove('flex'); }

    function actualizarStats(data) {
        const total = data.length;
        const si = data.filter(e => e.tipo === 'SI').length;
        const blanca = data.filter(e => e.tipo === 'BLANCA').length;

        statsContainer.innerHTML = `
            <div class="flex-1 min-w-[110px] bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1">Total</p>
                <span class="text-lg font-bold">${total}</span>
            </div>
            <div class="flex-1 min-w-[110px] bg-emerald-50 dark:bg-emerald-900/20 p-3 rounded-xl border border-emerald-100 dark:border-emerald-800/50 shadow-sm">
                <p class="text-[10px] uppercase tracking-wider font-bold text-emerald-600 dark:text-emerald-400 mb-1">Elecciones</p>
                <span class="text-lg font-bold text-emerald-700 dark:text-emerald-300">${si}</span>
            </div>
            <div class="flex-1 min-w-[110px] bg-slate-100 dark:bg-slate-800/50 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-[10px] uppercase tracking-wider font-bold text-slate-500 mb-1">Blancas</p>
                <span class="text-lg font-bold text-slate-700 dark:text-slate-300">${blanca}</span>
            </div>
        `;
    }

    function render(query = '') {
        if (typeof empresas === 'undefined') return;
        const q = query.toLowerCase().trim();
        const filtrados = empresas.filter(e => {
            const match = e.empresa.toLowerCase().includes(q) || e.municipio.toLowerCase().includes(q) || e.cif.toLowerCase().includes(q);
            return filtroTipo === 'TODAS' ? match : (match && e.tipo === filtroTipo);
        });

        actualizarStats(filtrados);

        lista.innerHTML = filtrados.map(e => `
            <div class="bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-700">
                <div class="p-5">
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-2.5 py-1 rounded-md ${e.tipo === 'SI' ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300'} text-[10px] font-bold uppercase tracking-wide">
                            ${e.tipo === 'SI' ? 'Con Elecciones' : 'Empresa Blanca'}
                        </span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">${e.empresa}</h3>
                    <div class="space-y-3 mb-6">
                        <div class="flex items-center gap-3 text-slate-600 dark:text-slate-400">
                            <span class="material-symbols-outlined text-sm text-primary/60">location_on</span>
                            <p class="text-xs">${e.direccion}, ${e.municipio} (${e.cp})</p>
                        </div>
                        <div class="flex items-center gap-3 text-slate-600 dark:text-slate-400">
                            <span class="material-symbols-outlined text-sm text-primary/60">groups</span>
                            <p class="text-xs">${e.trabajadores} trabajadores • Sector: ${e.sector}</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-3">
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(e.direccion + ', ' + e.municipio + ', Cuenca')}&travelmode=driving" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-primary/10 text-primary py-3 rounded-xl font-bold text-sm">
                                <span class="material-symbols-outlined text-lg">near_me</span> Ruta
                            </a>
                            <button onclick="generarEstrategia(${e.id})" class="flex-[2] flex items-center justify-center gap-2 bg-purple-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-purple-200 dark:shadow-none">
                                <span class="material-symbols-outlined text-lg">auto_awesome</span> Estrategia IA
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    filtrosBtn.forEach(btn => btn.addEventListener('click', () => {
        filtrosBtn.forEach(b => {
            b.classList.remove('bg-primary', 'text-white', 'shadow-md');
            b.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border');
        });
        btn.classList.add('bg-primary', 'text-white', 'shadow-md');
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border');
        filtroTipo = btn.dataset.tipo;
        render(buscador.value);
    }));

    buscador.addEventListener('input', (e) => render(e.target.value));
    window.addEventListener('load', () => render());
</script>
</body>
</html>
