<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Censo Cuenca 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e293b",
                        "accent": "#4f46e5",
                        "blanca": "#ef4444",
                        "si": "#10b981",
                    },
                    fontFamily: { "sans": ["Inter", "system-ui"] },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f8fafc; }
        
        .card-blanca { border-left: 4px solid #ef4444; }
        .card-si { border-left: 4px solid #10b981; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }

        .map-bg {
            background-color: #e2e8f0;
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .tab-active {
            background-color: white;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            color: #1e293b;
        }
    </style>
</head>
<body class="text-slate-900">

<header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
    <div class="px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-700 font-bold">analytics</span>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800">Censo Cuenca 2026</h1>
        </div>
        
        <!-- Selector de Modo: Lista / Mapa -->
        <div class="flex bg-slate-100 p-1 rounded-lg w-32 justify-between">
            <button onclick="switchTab('lista')" id="btn-tab-lista" class="flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all tab-active">LISTA</button>
            <button onclick="switchTab('mapa')" id="btn-tab-mapa" class="flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all text-slate-500">MAPA</button>
        </div>
    </div>

    <!-- Buscador Global -->
    <div class="px-5 pb-4 space-y-3">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input id="buscador" class="w-full bg-slate-50 border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-accent/20 transition-all" placeholder="Buscar empresa o municipio..." type="text"/>
        </div>
        
        <!-- Filtros Rápidos -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="filtros">
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-slate-800 text-white text-[11px] font-bold transition-all" data-tipo="TODAS">Todas</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all" data-tipo="SI">Con Elecciones</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all" data-tipo="BLANCA">Blancas</button>
        </div>
    </div>

    <!-- Barra de Estado -->
    <div id="stats-bar" class="flex border-t border-slate-100 bg-slate-50/50 px-5 py-2 justify-between items-center">
        <!-- Rellenado por JS -->
    </div>
</header>

<!-- Contenedor: MODO LISTA -->
<main id="tab-lista" class="page-content active px-5 py-6 space-y-4">
    <div id="lista-empresas" class="space-y-4">
        <!-- Cards se inyectan aquí -->
    </div>
</main>

<!-- Contenedor: MODO MAPA -->
<main id="tab-mapa" class="page-content px-5 py-6">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-3 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Localización Industrial</span>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1"><div class="size-2 rounded-full bg-si"></div> <span class="text-[9px] font-bold">SI</span></div>
                <div class="flex items-center gap-1"><div class="size-2 rounded-full bg-blanca"></div> <span class="text-[9px] font-bold">BLANCA</span></div>
            </div>
        </div>
        
        <!-- Canvas del Mapa -->
        <div class="h-[60dvh] relative map-bg overflow-hidden">
            <div id="map-markers" class="absolute inset-0"></div>
            
            <!-- Centro de Ayuda -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
                <div class="text-center">
                    <span class="material-symbols-outlined text-6xl text-slate-400">explore</span>
                    <p class="text-[10px] font-bold text-slate-500 uppercase mt-2">Mapa Territorial de Cuenca</p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Importación de Datos -->
<script src="datos.js"></script>

<script>
    const buscador = document.getElementById('buscador');
    const lista = document.getElementById('lista-empresas');
    const statsBar = document.getElementById('stats-bar');
    const mapMarkers = document.getElementById('map-markers');
    const filtrosBtn = document.querySelectorAll('.filter-btn');
    
    let filtroTipo = 'TODAS';

    // Navegación entre pestañas
    function switchTab(tab) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        
        const btnLista = document.getElementById('btn-tab-lista');
        const btnMapa = document.getElementById('btn-tab-mapa');
        
        if(tab === 'lista') {
            btnLista.classList.add('tab-active', 'text-slate-800');
            btnLista.classList.remove('text-slate-500');
            btnMapa.classList.remove('tab-active', 'text-slate-800');
            btnMapa.classList.add('text-slate-500');
        } else {
            btnMapa.classList.add('tab-active', 'text-slate-800');
            btnMapa.classList.remove('text-slate-500');
            btnLista.classList.remove('tab-active', 'text-slate-800');
            btnLista.classList.add('text-slate-500');
            renderMapa();
        }
    }

    // Función principal de Ruta
    function abrirRuta(empresa, municipio, direccion) {
        const query = encodeURIComponent(`${empresa}, ${direccion}, ${municipio}, Cuenca, España`);
        window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
    }

    // Actualización de indicadores numéricos
    function actualizarStats(data) {
        const total = data.length;
        const si = data.filter(e => e.tipo === 'SI').length;
        const blanca = data.filter(e => e.tipo === 'BLANCA').length;
        
        statsBar.innerHTML = `
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Resumen:</span>
                <div class="flex gap-3">
                    <span class="text-[11px] font-bold text-slate-700">${total} <span class="font-medium text-slate-400">Total</span></span>
                    <span class="text-[11px] font-bold text-si">${si} <span class="font-medium text-slate-400">SI</span></span>
                    <span class="text-[11px] font-bold text-blanca">${blanca} <span class="font-medium text-slate-400">Blanca</span></span>
                </div>
            </div>
            <span class="text-[9px] font-black text-slate-300">2026</span>
        `;
    }

    // Renderizado de la Lista
    function render(query = '') {
        if (typeof empresas === 'undefined') {
            lista.innerHTML = '<div class="py-10 text-center text-slate-400 text-xs">Cargando base de datos...</div>';
            return;
        }

        const q = query.toLowerCase().trim();
        const filtrados = empresas.filter(e => {
            const matchQuery = e.empresa.toLowerCase().includes(q) || 
                               e.municipio.toLowerCase().includes(q) || 
                               (e.sector && e.sector.toLowerCase().includes(q));
            const matchTipo = filtroTipo === 'TODAS' ? true : e.tipo === filtroTipo;
            return matchQuery && matchTipo;
        });

        actualizarStats(filtrados);

        if (filtrados.length === 0) {
            lista.innerHTML = '<div class="py-20 text-center text-slate-400 text-sm italic">Sin coincidencias</div>';
            return;
        }

        lista.innerHTML = filtrados.slice(0, 50).map(e => `
            <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200 ${e.tipo === 'SI' ? 'card-si' : 'card-blanca'}">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="font-extrabold text-sm text-slate-800 leading-tight uppercase">${e.empresa}</h3>
                    <span class="text-[9px] font-black px-1.5 py-0.5 rounded-md bg-slate-50 text-slate-400 border border-slate-100">${e.id}</span>
                </div>
                
                <div class="grid grid-cols-2 gap-y-2 mb-4">
                    <div class="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
                        <span class="material-symbols-outlined text-[14px] text-slate-400">location_on</span>
                        <span class="truncate">${e.municipio}</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
                        <span class="material-symbols-outlined text-[14px] text-slate-400">groups</span>
                        <span>${e.trabajadores} empl.</span>
                    </div>
                    <div class="col-span-2 flex items-center gap-1.5 text-[11px] text-slate-500 font-medium">
                        <span class="material-symbols-outlined text-[14px] text-slate-400">factory</span>
                        <span class="truncate">${e.sector || 'General'}</span>
                    </div>
                </div>

                <button onclick="abrirRuta('${e.empresa.replace(/'/g, "")}', '${e.municipio}', '${e.direccion || ""}')" 
                    class="w-full bg-slate-800 text-white py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-sm">directions</span> Calcular Ruta
                </button>
            </div>
        `).join('');
        
        // Si el mapa está activo, también lo actualizamos
        if (document.getElementById('tab-mapa').classList.contains('active')) {
            renderMapa(filtrados);
        }
    }

    // Renderizado de marcadores en el Mapa
    function renderMapa(dataOverride = null) {
        if (typeof empresas === 'undefined') return;

        const q = buscador.value.toLowerCase().trim();
        const filtrados = dataOverride || empresas.filter(e => {
            const matchQuery = e.empresa.toLowerCase().includes(q) || e.municipio.toLowerCase().includes(q);
            const matchTipo = filtroTipo === 'TODAS' ? true : e.tipo === filtroTipo;
            return matchQuery && matchTipo;
        });

        mapMarkers.innerHTML = '';
        
        // Para el mapa limitamos el número de puntos por rendimiento visual
        const visibleMarkers = filtrados.slice(0, 40);
        visibleMarkers.forEach(e => {
            const pin = document.createElement('div');
            // Generamos posición pseudo-geográfica estable basada en el ID
            const posX = ((e.id % 85) + 5); 
            const posY = (((e.id * 7) % 85) + 5);
            
            pin.className = `absolute size-3.5 rounded-full border-2 border-white shadow-sm cursor-pointer hover:scale-150 transition-transform`;
            pin.style.backgroundColor = e.tipo === 'SI' ? '#10b981' : '#ef4444';
            pin.style.left = `${posX}%`;
            pin.style.top = `${posY}%`;
            pin.title = e.empresa;
            
            mapMarkers.appendChild(pin);
        });
    }

    // Gestión de filtros de botones
    filtrosBtn.forEach(btn => btn.addEventListener('click', () => {
        filtrosBtn.forEach(b => {
            b.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all";
        });
        btn.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-slate-800 text-white text-[11px] font-bold transition-all";
        filtroTipo = btn.dataset.tipo;
        render(buscador.value);
    }));

    buscador.addEventListener('input', (e) => render(e.target.value));

    // Arranque inicial
    setTimeout(() => render(), 150);
</script>
</body>
</html>
